services:
  - type: web
    name: astralearn-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGIN
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
